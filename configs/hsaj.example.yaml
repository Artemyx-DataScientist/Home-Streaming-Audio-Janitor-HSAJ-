# Example HSAJ configuration
# Copy this file to configs/hsaj.yaml and adjust it for your environment.

database:
  driver: sqlite
  path: ./data/hsaj.db

paths:
  library_roots:
    - /mnt/music
  atmos_dir: /mnt/music_atmos
  quarantine_dir: /mnt/music/_quarantine_delete
  inbox_dir: /mnt/music_inbox
  scan_extensions:
    - flac
    - mp3
    - m4a
    - wav
  scan_exclude_dirs:
    - /mnt/music/_incoming
    - /mnt/music/_tmp
  scan_batch_size: 200
  ffprobe_path: ffprobe

policy:
  block_grace_days: 30
  quarantine_delete_days: 60
  auto_delete: false
  enable_behavior_scoring: true
  soft_never_played_days: 180
  soft_inbox_days: 30

bridge:
  http_url: http://127.0.0.1:8080
  ws_url: ws://127.0.0.1:8080/events
  contract_version: v1

security:
  operator_host: 127.0.0.1
  operator_port: 8090
  operator_token: null

observability:
  log_level: INFO
  structured_logging: true
  service_name: hsaj-core
