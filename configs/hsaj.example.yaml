# Example HSAJ configuration
# Copy this file to configs/hsaj.yaml and adjust it for your environment.

database:
  driver: sqlite
  path: ./data/hsaj.db

paths:
  library_roots:
    - /mnt/music
  atmos_dir: /mnt/music_atmos
  quarantine_dir: /mnt/music/_quarantine_delete
  inbox_dir: /mnt/music_inbox
  scan_extensions:
    - flac
    - mp3
    - m4a
    - wav
  scan_exclude_dirs:
    - /mnt/music/_incoming
    - /mnt/music/_tmp
  scan_batch_size: 200
  ffprobe_path: ffprobe

policy:
  block_grace_days: 30
  quarantine_delete_days: 60
  auto_delete: false
  enable_behavior_scoring: true
